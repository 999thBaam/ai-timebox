name: ai_timebox
description: "AI-powered daily planner with timeboxing, voice input, and smart scheduling."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  http: ^1.4.0
  speech_to_text: ^7.0.0
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^19.0.0
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.4+4

flutter:
  uses-material-design: true
